name: E2E Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          E2E_BASED_URL: ${{ secrets.VITE_BASED_URL }}
          E2E_BASED_ANON_KEY: ${{ secrets.VITE_BASED_ANON_KEY }}
          E2E_BASED_EMAIL: ${{ secrets.E2E_BASED_EMAIL }}
          E2E_BASED_PASSWORD: ${{ secrets.E2E_BASED_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
